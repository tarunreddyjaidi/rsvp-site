<form name="rsvp" method="POST" action="https://formspree.io/f/meerryrr">
  <!-- Hidden input required by Formspree -->
  <input type="hidden" name="form-name" value="rsvp">

  <label>Your Name:</label>
  <input type="text" name="name" required>

  <label>Will you attend?</label>
  <select name="attending" required>
    <option value="" disabled selected>--Select--</option>
    <option>Yes</option>
    <option>No</option>
  </select>

  <label>Meal Preference:</label>
  <select name="meal" required>
    <option value="" disabled selected>--Select--</option>
    <option>Veg</option>
    <option>Non-Veg</option>
  </select>

  <label>Bringing a Guest?</label>
  <select name="guest" required>
    <option value="" disabled selected>--Select--</option>
    <option>No</option>
    <option>Yes</option>
  </select>

  <label>Any message or note for the host?</label>
  <textarea name="note" rows="3" placeholder="Write something..."></textarea>

  <button type="submit">Submit RSVP</button>
</form>
