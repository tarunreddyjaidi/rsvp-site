<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    .cover {
      background-image: url('./cover.jpg');
      background-size: cover;          /* fills screen */
      background-position: center;     /* centers image */
      background-repeat: no-repeat;
      height: 100vh;
      width: 100%;
      position: relative;
    }

    .overlay {
      position: absolute;
      bottom: 40px;
      width: 100%;
      text-align: center;
    }

    .btn {
      background-color: rgba(212, 68, 68, 0.9);
      color: white;
      padding: 14px 28px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background-color: rgba(180, 50, 50, 0.9);
    }

    /* Mobile adjustments */
    @media (max-width: 600px) {
      .btn {
        font-size: 16px;
        padding: 12px 24px;
      }
    }
  </style>
</head>

<body>

  <div class="cover">
    <div class="overlay">
      <a href="form.html" class="btn">RSVP Now</a>
    </div>
  </div>

</body>
</html>
