<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
    }

    .cover {
      background-image: url('cover.jpeg');
      background-size: cover;
      background-position: center;
      height: 100vh;
      width: 100%;
      position: relative;
    }

    .btn-container {
      position: absolute;
      bottom: 40px;
      width: 100%;
      text-align: center;
    }

    .btn {
      background-color: rgba(212, 68, 68, 0.9);
      color: white;
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      text-decoration: none;
    }

    .btn:hover {
      background-color: rgba(180, 50, 50, 0.9);
    }
  </style>
</head>

<body>

  <div class="cover">
    <div class="btn-container">
      <a href="form.html" class="btn">RSVP Now</a>
    </div>
  </div>

</body>
</html>
