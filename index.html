<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>

  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    .container {
      position: relative;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    .cover-img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* 👈 shows FULL image (no crop) */
      background-color: black; /* fills empty space nicely */
    }

    .overlay {
      position: absolute;
      bottom: 40px;
      width: 100%;
      text-align: center;
    }

    .btn {
      background-color: rgba(212, 68, 68, 0.9);
      color: white;
      padding: 14px 28px;
      font-size: 18px;
      border-radius: 30px;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background-color: rgba(180, 50, 50, 0.9);
    }

    @media (max-width: 600px) {
      .btn {
        font-size: 16px;
        padding: 12px 24px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <!-- IMAGE -->
    <img src="cover.jpeg" alt="Invitation" class="cover-img">

    <!-- BUTTON -->
    <div class="overlay">
      <a href="form.html" class="btn">RSVP Now</a>
    </div>
  </div>

</body>
</html>
