<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSVP for Your Event</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background-color: #fefefe;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #d44;
    }
    form {
      background-color: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }
    input, select, textarea, button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    button {
      margin-top: 20px;
      background-color: #d44;
      color: #fff;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #b33;
    }
    #thanksMessage {
      text-align: center;
      color: green;
      font-weight: bold;
      margin-top: 20px;
      display: none;
    }
  </style>
</head>
<body>

  <h1>🎉 You're Invited!</h1>
  <p><b>Event:</b> John’s Wedding</p>
  <p><b>Date:</b> Dec 20, 2026</p>

  <!-- RSVP Form with your Formspree ID -->
  <form action="https://formspree.io/f/meerryrr" method="POST" id="rsvpForm">
    <label>Your Name:</label>
    <input type="text" name="name" required>

    <label>Will you attend?</label>
    <select name="attending" required>
      <option value="">--Select--</option>
      <option>Yes</option>
      <option>No</option>
    </select>

    <label>Meal Preference:</label>
    <select name="meal" required>
      <option value="">--Select--</option>
      <option>Veg</option>
      <option>Non-Veg</option>
    </select>

    <label>Bringing a Guest?</label>
    <select name="guest" required>
      <option value="">--Select--</option>
      <option>No</option>
      <option>Yes</option>
    </select>

    <label>Any message or note for the host?</label>
    <textarea name="note" rows="3" placeholder="Write something..."></textarea>

    <button type="submit">Submit RSVP</button>
  </form>

  <p id="thanksMessage">Thank you for your response! 🎉</p>

  <script>
    const form = document.getElementById('rsvpForm');
    const thanks = document.getElementById('thanksMessage');

    form.addEventListener('submit', function(e) {
      // Show thank you message immediately
      thanks.style.display = 'block';
      // Reset form fields
      form.reset();
    });
  </script>

</body>
</html>
